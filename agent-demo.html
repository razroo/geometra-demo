<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometra — Agent Interaction Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #0f172a;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
    }

    .container { display: flex; flex: 1; overflow: hidden; }

    /* Left: Canvas */
    .canvas-panel {
      flex: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      border-right: 1px solid #1e293b;
      overflow: hidden;
    }
    .canvas-panel canvas { display: block; }

    /* Right: Agent Log */
    .log-panel {
      flex: 4;
      display: flex;
      flex-direction: column;
      background: #0b1120;
      min-width: 380px;
    }
    .log-header {
      padding: 16px 20px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .log-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: #f8fafc;
    }
    .log-header .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .badge-api { background: #3b82f6; color: #fff; }
    .badge-sim { background: #f59e0b; color: #000; }

    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }
    .log-body::-webkit-scrollbar { width: 6px; }
    .log-body::-webkit-scrollbar-track { background: transparent; }
    .log-body::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    .log-entry {
      padding: 6px 20px;
      font-size: 12.5px;
      line-height: 1.5;
      border-left: 3px solid transparent;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .log-entry.read    { border-left-color: #3b82f6; }
    .log-entry.think   { border-left-color: #f59e0b; }
    .log-entry.act     { border-left-color: #22c55e; }
    .log-entry.observe { border-left-color: #a855f7; }

    .phase-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 1px 6px;
      border-radius: 3px;
      margin-right: 8px;
    }
    .phase-tag.read    { background: #1e3a5f; color: #60a5fa; }
    .phase-tag.think   { background: #422006; color: #fbbf24; }
    .phase-tag.act     { background: #052e16; color: #4ade80; }
    .phase-tag.observe { background: #2e1065; color: #c084fc; }

    .log-msg { color: #cbd5e1; }
    .log-detail {
      margin-top: 4px;
      padding: 8px 12px;
      background: #1e293b;
      border-radius: 4px;
      font-size: 11px;
      color: #94a3b8;
      white-space: pre-wrap;
      max-height: 140px;
      overflow-y: auto;
    }

    /* Bottom status bar */
    .status-bar {
      padding: 10px 20px;
      background: #1e293b;
      border-top: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: #94a3b8;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .nav-link {
      color: #3b82f6;
      text-decoration: none;
      font-size: 12px;
    }
    .nav-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="canvas-panel">
      <canvas id="app"></canvas>
    </div>
    <div class="log-panel">
      <div class="log-header">
        <h2>Agent Interaction Loop</h2>
        <span class="badge badge-api">REST API</span>
        <span class="badge badge-sim">Simulated</span>
      </div>
      <div class="log-body" id="log"></div>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-dot"></div>
    <span>Agent active</span>
    <span>|</span>
    <span id="cycle-counter">Cycle 0</span>
    <span>|</span>
    <span>No browser needed — agents consume geometry as JSON</span>
    <span style="flex:1"></span>
    <a href="index.html" class="nav-link">Canvas Demo</a>
  </div>
  <script type="module" src="/src/agent-demo.ts"></script>
</body>
</html>
